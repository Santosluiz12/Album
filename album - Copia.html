<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Álbum de Fotos ❤️</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fundo em degradê suave de branco para rosa */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #FFFFFF 0%, #FFE4E1 50%, #FFB6C1 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Estilização do Título */
        header {
            text-align: center;
            padding: 30px 20px 10px 20px;
            position: relative;
            z-index: 2;
        }

        header h1 {
            color: #D81B60;
            font-size: 2.3rem;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        header p {
            color: #666;
            font-size: 1rem;
        }

        /* Container Principal do Carrossel */
        .carousel-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 450px; /* Base de tamanho do card principal */
            perspective: 1200px; /* Melhora o efeito 3D de profundidade */
        }

        /* Container que guarda os cards */
        .carousel-track {
            position: relative;
            width: 100%;
            height: 480px; /* Altura para acomodar foto + legenda */
            transform-style: preserve-3d;
        }

        /* Card estilo Polaroid */
        .photo-card {
            background: white;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease;
        }

        /* --- ESTADOS DO CARROSSEL 3D --- */

        /* Card Ativo (Centro - Grande e Destacado) */
        .photo-card.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateZ(0) rotate(-1deg);
            z-index: 5;
        }

        /* Card Anterior (Esquerda - Menor e recuado) */
        .photo-card.prev {
            opacity: 0.65;
            pointer-events: auto;
            transform: translateX(-65%) scale(0.8) translateZ(-100px) rotate(-5deg);
            z-index: 3;
            cursor: pointer;
        }

        /* Card Próximo (Direita - Menor e recuado) */
        .photo-card.next {
            opacity: 0.65;
            pointer-events: auto;
            transform: translateX(65%) scale(0.8) translateZ(-100px) rotate(5deg);
            z-index: 3;
            cursor: pointer;
        }

        .photo-card img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-radius: 6px;
            background-color: #f5f5f5;
        }

        .photo-card span {
            display: inline-block;
            margin-top: 15px;
            color: #e91e63;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Botões de Navegação (Setas) */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.9);
            border: none;
            color: #D81B60;
            font-size: 1.8rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            z-index: 10;
        }

        .nav-btn:hover {
            background: #D81B60;
            color: white;
            transform: translateY(-50%) scale(1.1);
        }

        /* Setas posicionadas nas extremidades */
        .prev-btn { left: -100px; }
        .next-btn { right: -100px; }

        /* Responsividade para telas menores (Celulares) */
        @media (max-width: 768px) {
            .carousel-container { max-width: 75vw; }
            .carousel-track { height: 400px; }
            .photo-card img { height: 300px; }
            
            .photo-card.prev { transform: translateX(-45%) scale(0.75) translateZ(-100px); opacity: 0.5; }
            .photo-card.next { transform: translateX(45%) scale(0.75) translateZ(-100px); opacity: 0.5; }
            
            .prev-btn { left: -45px; width: 40px; height: 40px; font-size: 1.4rem; }
            .next-btn { right: -45px; width: 40px; height: 40px; font-size: 1.4rem; }
        }

        /* Corações flutuantes ao fundo */
        .hearts-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.35);
            font-size: 24px;
            animation: float 10s infinite linear;
            bottom: -50px;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% {
                transform: translateY(-105vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="hearts-background" id="heartsContainer"></div>

    <header>
        <h1>Nosso Álbum de Memórias ❤️</h1>
        <p>Um espaço especial para guardar nossos melhores momentos</p>
    </header>

    <main class="carousel-wrapper">
        <div class="carousel-container">
            <button class="nav-btn prev-btn" id="prevBtn">&#10094;</button>
            <button class="nav-btn next-btn" id="nextBtn">&#10095;</button>

            <div class="carousel-track" id="carouselTrack"></div>
        </div>
    </main>

    <div style="height: 30px;"></div>

    <script>
        const track = document.getElementById('carouselTrack');
        
        // 1. DECLARAÇÃO DAS FOTOS (Corrigido para .JPEG maiúsculo)
        const listaFotos = [
            { src: 'css/foto1', legenda: 'Momento 01 ❤️' },
            { src: 'css/foto2.JPEG', legenda: 'Momento 02 ❤️' },
            { src: 'css/foto3.JPEG', legenda: 'Momento 03 ❤️' },
            { src: 'css/foto4.JPEG', legenda: 'Momento 04 ❤️' },
            { src: 'css/foto5.JPEG', legenda: 'Momento 05 ❤️' },
            { src: 'css/foto6.JPEG', legenda: 'Momento 06 ❤️' },
            { src: 'css/foto7.JPEG', legenda: 'Momento 07 ❤️' },
            { src: 'css/foto8.JPEG', legenda: 'Momento 08 ❤️' },
            { src: 'css/foto9.JPEG', legenda: 'Momento 09 ❤️' },
            { src: 'css/foto10.JPEG', legenda: 'Momento 10 ❤️' },
            { src: 'css/foto11.JPEG', legenda: 'Momento 11 ❤️' },
            { src: 'css/foto12.JPEG', legenda: 'Momento 12 ❤️' },
            { src: 'css/foto13.JPEG', legenda: 'Momento 13 ❤️' },
            { src: 'css/foto14.JPEG', legenda: 'Momento 14 ❤️' },
            { src: 'css/foto15.JPEG', legenda: 'Momento 15 ❤️' },
            { src: 'css/foto16.JPEG', legenda: 'Momento 16 ❤️' },
            { src: 'css/foto17.JPEG', legenda: 'Momento 17 ❤️' },
            { src: 'css/foto18.JPEG', legenda: 'Momento 18 ❤️' },
            { src: 'css/foto19.JPEG', legenda: 'Momento 19 ❤️' },
            { src: 'css/foto20.JPEG', legenda: 'Momento 20 ❤️' },
            { src: 'css/foto21.JPEG', legenda: 'Momento 21 ❤️' },
            { src: 'css/foto22.JPEG', legenda: 'Momento 22 ❤️' },
            { src: 'css/foto23.JPEG', legenda: 'Momento 23 ❤️' },
            { src: 'css/foto24.JPEG', legenda: 'Momento 24 ❤️' },
            { src: 'css/foto25.JPEG', legenda: 'Momento 25 ❤️' },
            { src: 'css/foto26.JPEG', legenda: 'Momento 26 ❤️' },
            { src: 'css/foto27.JPEG', legenda: 'Momento 27 ❤️' },
            { src: 'css/foto28.JPEG', legenda: 'Momento 28 ❤️' },
            { src: 'css/foto29.JPEG', legenda: 'Momento 29 ❤️' },
            { src: 'css/foto30.JPEG', legenda: 'Momento 30 ❤️' },
            { src: 'css/foto31.JPEG', legenda: 'Momento 31 ❤️' },
            { src: 'css/foto32.JPEG', legenda: 'Momento 32 ❤️' },
            { src: 'css/foto33.JPEG', legenda: 'Momento 33 ❤️' },
            { src: 'css/foto34.JPEG', legenda: 'Momento 34 ❤️' },
            { src: 'css/foto35.JPEG', legenda: 'Momento 35 ❤️' },
            { src: 'css/foto36.JPEG', legenda: 'Momento 36 ❤️' },
            { src: 'css/foto37.JPEG', legenda: 'Momento 37 ❤️' },
            { src: 'css/foto38.JPEG', legenda: 'Momento 38 ❤️' },
            { src: 'css/foto39.JPEG', legenda: 'Momento 39 ❤️' },
            { src: 'css/foto40.JPEG', legenda: 'Momento 40 ❤️' },
            { src: 'css/foto41.JPEG', legenda: 'Momento 41 ❤️' },
            { src: 'css/foto42.JPEG', legenda: 'Momento 42 ❤️' },
            { src: 'css/foto43.JPEG', legenda: 'Momento 43 ❤️' },
            { src: 'css/foto44.JPEG', legenda: 'Momento 44 ❤️' },
            { src: 'css/foto45.JPEG', legenda: 'Momento 45 ❤️' },
            { src: 'css/foto46.JPEG', legenda: 'Momento 46 ❤️' },
            { src: 'css/foto47.JPEG', legenda: 'Momento 47 ❤️' },
            { src: 'css/foto48.JPEG', legenda: 'Momento 48 ❤️' },
            { src: 'css/foto49.JPEG', legenda: 'Momento 49 ❤️' }
        ];

        const totalCards = listaFotos.length;

        // Renderiza as fotos declaradas acima dentro do Carrossel
        listaFotos.forEach((foto, index) => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.innerHTML = `
                <img src="${foto.src}" alt="Foto ${index + 1}">
                <span>${foto.legenda}</span>
            `;
            track.appendChild(card);
        });

        // 2. Lógica de Funcionamento do Carrossel 3D
        const cards = document.querySelectorAll('.photo-card');
        let currentIndex = 0;

        function updateCarousel() {
            cards.forEach(card => {
                card.classList.remove('active', 'prev', 'next');
            });

            const prevIndex = (currentIndex - 1 + totalCards) % totalCards;
            const nextIndex = (currentIndex + 1) % totalCards;

            if (cards[currentIndex]) cards[currentIndex].classList.add('active');
            if (cards[prevIndex]) cards[prevIndex].classList.add('prev');
            if (cards[nextIndex]) cards[nextIndex].classList.add('next');
        }

        track.addEventListener('click', (e) => {
            const clickedCard = e.target.closest('.photo-card');
            if (!clickedCard) return;

            if (clickedCard.classList.contains('prev')) {
                navigateCarousel(-1);
            } else if (clickedCard.classList.contains('next')) {
                navigateCarousel(1);
            }
        });

        function navigateCarousel(direction) {
            currentIndex = (currentIndex + direction + totalCards) % totalCards;
            updateCarousel();
        }

        document.getElementById('nextBtn').addEventListener('click', () => navigateCarousel(1));
        document.getElementById('prevBtn').addEventListener('click', () => navigateCarousel(-1));

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') navigateCarousel(1);
            if (e.key === 'ArrowLeft') navigateCarousel(-1);
        });

        // Inicializa o carrossel
        updateCarousel();

        // 3. Efeito dos Corações Flutuantes
        function createHeart() {
            const container = document.getElementById('heartsContainer');
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            
            heart.style.left = Math.random() * 100 + 'vw';
            
            const size = Math.random() * 20 + 10;
            heart.style.fontSize = size + 'px';
            
            const duration = Math.random() * 6 + 6;
            heart.style.animationDuration = duration + 's';
            
            container.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        setInterval(createHeart, 450);
    </script>

</body>
</html>
